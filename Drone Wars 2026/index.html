<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drone Wars 26</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;700&family=Teko:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section id="turnHud" class="turn-hud hidden" aria-live="polite">
    <p id="turnFlavor" class="turn-flavor">Turn sequence not started. Start a new game.</p>
    <p id="turnMeta" class="turn-meta">Initiative: Russia</p>
    <p id="weatherLine" class="weather-line">Season rules will appear here.</p>
    <section id="battlefieldPanel" class="battlefield-panel hidden" aria-label="Battlefield">
      <div class="battlefield-stage">
        <aside class="info-controls-stub" aria-label="Information and controls stub">
          <p class="info-controls-title">Information/controls stub</p>
          <section class="ammo-track-panel" aria-label="Artillery ammunition track">
            <div class="ammo-track-header">
              <p class="ammo-track-title">Artillery Ammo</p>
              <p class="ammo-track-subtitle">Vertical reserve track</p>
            </div>
            <div class="ammo-track-columns">
              <div class="ammo-track-column">
                <p class="ammo-track-side">Russia</p>
                <div id="russiaAmmoTrack" class="ammo-track" aria-hidden="true"></div>
                <p id="russiaAmmoLabel" class="ammo-track-label"></p>
              </div>
              <div class="ammo-track-column">
                <p class="ammo-track-side">Ukraine</p>
                <div id="ukraineAmmoTrack" class="ammo-track" aria-hidden="true"></div>
                <p id="ukraineAmmoLabel" class="ammo-track-label"></p>
              </div>
            </div>
          </section>
          <p id="infoControlsMeta" class="info-controls-meta"></p>
        </aside>
        <div class="battlefield-wrap">
          <p class="battlefield-title">Battlefield Stub (20x16 Hex Grid)</p>
          <div class="battlefield-map-canvas">
            <svg id="battlefieldSvg" class="battlefield-svg" role="img" aria-label="Stubbed battlefield map"></svg>
          </div>
        </div>
      </div>
    </section>
    <section id="eventPanel" class="event-panel hidden" aria-live="polite">
      <div class="event-layout">
        <img id="eventIcon" class="event-icon hidden" alt="" />
        <div class="event-copy">
          <p id="eventTitle" class="event-title"></p>
          <p id="eventBlurb" class="event-blurb"></p>
          <p id="eventEffect" class="event-effect"></p>
        </div>
      </div>
    </section>
    <section id="strategicCardsPanel" class="strategic-cards-panel hidden" aria-live="polite">
      <p id="strategicCardsTitle" class="strategic-cards-title"></p>
      <p id="strategicCardsMeta" class="strategic-cards-meta"></p>
      <p id="strategicPoolDebug" class="strategic-cards-debug"></p>
      <div id="strategicCardsHand" class="strategic-cards-hand"></div>
    </section>
    <section id="techTreePanel" class="tech-tree-panel hidden" aria-label="Technology tree">
      <iframe
        id="techTreeFrame"
        class="tech-tree-frame"
        title="Drone Wars technology tree"
        loading="lazy"
      ></iframe>
    </section>
  </section>

  <section id="turnFooter" class="turn-footer hidden" aria-label="Turn actions">
    <button id="mainMenuBtn" class="menu-btn" type="button">Main Menu</button>
    <button id="strategicHandBtn" class="menu-btn hidden" type="button">Strategic Hand</button>
    <button id="techTreeBtn" class="menu-btn" type="button">Tech Tree</button>
    <button id="toggleBattlefieldBtn" class="menu-btn" type="button">Battlefield</button>
    <button id="endTurnBtn" class="menu-btn end-turn" type="button" disabled>End Turn</button>
  </section>

  <main id="menuScreen" class="menu-screen">
    <nav class="menu-actions" aria-label="Main menu">
      <button id="newGameBtn" class="menu-btn">New Game</button>
      <button id="continueBtn" class="menu-btn">Continue</button>
      <button id="settingsBtn" class="menu-btn">Settings</button>
      <button id="quitBtn" class="menu-btn danger">Quit</button>
      <input id="loadSaveInput" type="file" accept=".json,application/json" hidden />
    </nav>

    <p class="player-line" id="playerLine">Commander: Operator</p>
    <p id="statusMessage" class="status-message" role="status" aria-live="polite"></p>
  </main>

  <dialog id="settingsDialog">
    <form method="dialog" id="settingsForm">
      <h2>Settings</h2>
      <label for="playerNameInput">Player Name</label>
      <input id="playerNameInput" name="playerNameInput" type="text" maxlength="24" required />
      <menu>
        <button value="cancel">Cancel</button>
        <button id="saveSettingsBtn" value="default">Save</button>
      </menu>
    </form>
  </dialog>

  <script src="events.js"></script>
  <script src="strategic_cards.js"></script>
  <script src="main.js"></script>
</body>
</html>

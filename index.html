<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ELITE-style Wireframe Space Game</title>
    <style>
        body { margin: 0; overflow: hidden; background: black; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="hud" style="position:fixed;top:10px;left:10px;color:#0f0;font-family:monospace;line-height:1.2;">
        <div id="speed">Speed: 0.00</div>
        <div id="coords">X:0.00 Y:0.00 Z:0.00</div>
        <div id="warn" style="color:#f00;"> </div>
    </div>
    <canvas id="radar" width="150" height="150" style="position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.5);border:1px solid #0f0;"></canvas>
    <script type="module" src="main.js"></script>
</body>
</html>
